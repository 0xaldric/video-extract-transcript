name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.11", "3.12"]
        exclude:
          # 3.8 is not available on the macos-latest (arm64) runners.
          - os: macos-latest
            python-version: "3.8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package with dev dependencies
        run: python -m pip install --upgrade pip && pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test the CLI
        run: |
          yt-transcript --version
          python -m yt_transcript --version
