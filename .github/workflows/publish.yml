name: Publish to PyPI

# Runs when you publish a GitHub Release (e.g. for tag v1.0.0).
on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual runs from the Actions tab / gh CLI

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only runs once you've set up PyPI Trusted Publishing and added a repo
    # variable PYPI_PUBLISH=true (Settings -> Secrets and variables -> Actions).
    # Until then the build job still runs, but nothing is pushed to PyPI.
    if: vars.PYPI_PUBLISH == 'true'
    # The PyPI "release" environment + this permission enable Trusted Publishing.
    environment:
      name: release
      url: https://pypi.org/p/yt-transcript
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
